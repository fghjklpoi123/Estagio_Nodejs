<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <link rel="stylesheet" href="plano.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="/theme.css">
  <script src="/js/authGuard.js"></script>
  <style>
    .plano-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 20px;
      margin: 15px 0;
      box-shadow: var(--shadow);
    }
    .plano-card h3 {
      margin: 0 0 10px 0;
      color: var(--text);
    }
    .plano-info {
      margin: 8px 0;
      font-size: 14px;
      color: var(--text-soft);
    }
    .plano-preco {
      font-size: 18px;
      font-weight: bold;
      color: #2ecc71;
      margin: 10px 0;
    }
    .plano-desc {
      font-size: 13px;
      color: var(--text-soft);
      margin: 10px 0;
      max-height: 80px;
      overflow-y: auto;
    }
    .btn-assinar {
      background: #3498db;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      margin-top: 10px;
      transition: background 0.3s;
    }
    .btn-assinar:hover {
      background: #2980b9;
    }
    .btn-assinar:disabled {
      background: #bdc3c7;
      cursor: not-allowed;
    }
    .status-message {
      padding: 12px;
      margin: 10px 0;
      border-radius: 4px;
      text-align: center;
      font-weight: bold;
    }
    .status-success {
      background: var(--success-bg);
      color: var(--success-color);
      border: 1px solid #c3e6cb;
    }
    .status-error {
      background: var(--error-bg);
      color: var(--error-color);
      border: 1px solid #f5c6cb;
    }
    .status-info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

    <li><a href="../planoFront/planos-aluno.html" data-menu="meus-planos"><i class="fa-solid fa-ticket"></i> Meus Planos</a></li>
