<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Criar Conta - AcadFlow</title>
  <link rel="stylesheet" href="cadastro.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="/theme.css">
  <script src="/js/theme.js"></script>
</head>
<body>

  <div class="cadastro-wrapper">
    <div class="cadastro-card">

      <div class="cadastro-header">
        <h1>Criar Conta</h1>
        <p>Preencha os dados abaixo para se cadastrar</p>
      </div>

      <div id="mensagem" class="mensagem" style="display: none;"></div>

      <form id="cadastroForm" class="cadastro-form">
  
        <div class="form-group full-width">
          <label for="nome">Nome Completo *</label>
          <input type="text" id="nome" placeholder="João Silva" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="email">E-mail *</label>
            <input type="email" id="email" placeholder="seu@exemplo.com" required>
          </div>
          <div class="form-group">
            <label for="cpf">CPF *</label>
            <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="senha">Senha *</label>
            <input type="password" id="senha" placeholder="••••••••" required>
          </div>
          <div class="form-group">
            <label for="confirmaSenha">Confirmar Senha *</label>
            <input type="password" id="confirmaSenha" placeholder="••••••••" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" placeholder="(11) 98765-4321" maxlength="15">
          </div>
          <div class="form-group">
            <label for="dataNascimento">Data de Nascimento *</label>
            <input type="date" id="dataNascimento" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="sexo">Sexo *</label>
            <select id="sexo" required>
              <option value="">Selecione...</option>
              <option value="M">Masculino</option>
              <option value="F">Feminino</option>
              <option value="O">Outro</option>
            </select>
          </div>
          <div class="form-group">
            <label for="endereco">Endereço</label>
            <input type="text" id="endereco" placeholder="Rua, número, cidade">
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-cadastro">Criar Conta</button>
          <a href="/loginFront/login.html" class="btn-voltar">Voltar ao Login</a>
        </div>

      </form>

    </div>
  </div>

  <script src="cadastro.js"></script>
</body>
</html>
