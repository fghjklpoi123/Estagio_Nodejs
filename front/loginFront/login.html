<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bem-vindo ao AcadFlow</title>
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="/theme.css">
  <script src="/js/theme.js"></script>
</head>
<body>

  <div class="login-wrapper">

    <div class="login-card">

     <div class="login-image">
  <img src="logo2.png" alt="Logo AcadFlow">
</div>
      <div class="login-content">
        <div class="brand">
          <h1>Bem-vindo ao <span class="brand-acadflow">AcadFlow</span></h1>
          <p class="tagline">O seu sistema de gestão da academia — simples e rápido.</p>
        </div>

        <form id="loginForm" class="login-form" action="/homeFront/home.html" method="GET">
          <div id="mensagem" class="mensagem" style="display: none;"></div>
          
          <label for="username">E-mail</label>
          <input id="username" name="email" type="email" placeholder="seu@exemplo.com" required>

          <label for="password">Senha</label>
          <input id="password" name="senha" type="password" placeholder="••••••••" required>

          <button type="submit" class="btn-login">
            Entrar
          </button>
        </form>

        <div class="criar-conta-wrapper">
  <a href="../cadastro/cadastro.html" class="link-criar-conta">Criar conta</a>
</div>
      </div>
    </div>

  </div>

  <script src="/loginFront/login.js"></script>
</body>
</html>
