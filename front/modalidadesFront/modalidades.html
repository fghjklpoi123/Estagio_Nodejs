    <main class="content">
        <div class="top">
            <h1>Modalidades</h1>

            <div class="filters">
                <input type="text" id="buscarModalidade" placeholder="Buscar modalidade..." />
            </div>

            <button id="btnNovaModalidade" class="btn-primary">
                <i class="fa-solid fa-plus"></i> Nova Modalidade
            </button>
        </div>

        <section class="lista" id="listaModalidades"></section>

        <div id="paginacao" class="paginacao"></div>
    </main>

    <div class="modal-bg" id="modalModalidade">
        <div class="modal">
            <h2 id="tituloModal">Nova Modalidade</h2>

            <label>Nome</label>
            <input type="text" id="nomeModalidade" />

            <label>Descrição</label>
            <textarea id="descModalidade"></textarea>

            <div class="modal-actions">
                <button class="btn-primary" id="salvarModalidade">Salvar</button>
                <button class="btn-secondary" id="fecharModal">Cancelar</button>
            </div>
        </div>
    </div>
