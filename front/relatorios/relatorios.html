  <main class="content">
    <div class="top">
      <h1>Relatórios</h1>

      <div class="controls">
        
      </div>

    <section class="report-grid">

      <div class="report-card" id="report-professores">
        <h3>Modalidades Populares (PDF)</h3>
        <div class="report-controls">
          <button class="btn-primary" id="pdfProfessores"><i class="fa-solid fa-file-pdf"></i> Modalidades Populares (PDF)</button>
        </div>
        <table id="tableProfessores" class="report-table">
          <thead>
            <tr>
              <th>Modalidades</th>
              <th>Solicitações</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="report-card" id="report-alunos">
        <h3>Alunos sem Modalidade (PDF)</h3>
        <div class="report-controls">
          <button class="btn-primary" id="pdfAlunos"><i class="fa-solid fa-file-pdf"></i> Alunos sem Modalidade (PDF)</button>
        </div>
        <table id="tableAlunos" class="report-table">
          <thead>
            <tr>
              <th>Alunos</th>
              <th>Presenças</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="report-card" id="report-pico">
        <h3>Alunos por Modalidade (PDF)</h3>
        <div class="report-controls">
          <button class="btn-primary" id="pdfPico"><i class="fa-solid fa-file-pdf"></i> Alunos por Modalidade (PDF)</button>

        <table id="tablePico" class="report-table">
          <thead>
            <tr>

          </thead>
          <tbody></tbody>
