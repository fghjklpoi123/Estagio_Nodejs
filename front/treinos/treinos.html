<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treinos</title>
  <link rel="stylesheet" href="treinos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="/theme.css">
  <script src="/js/authGuard.js"></script>
</head>
<body>

    <aside class="sidebar">
  <div class="sidebar-logo">
    <img src="../loginFront/logo.png" alt="Logo">
    <span>Nome da Empresa</span>
  </div>

  <ul class="menu">
    <li><a href="../homeFront/home.html" data-menu="home"><i class="fa-solid fa-house"></i> Home</a></li>
    <li><a href="../alunosFront/alunos.html" data-menu="alunos"><i class="fa-solid fa-user"></i> Alunos</a></li>
    <li><a href="../treinadoresFront/treinadores.html" data-menu="treinadores"><i class="fa-solid fa-user-tie"></i> Treinadores</a></li>
    <li><a href="../modalidadesFront/modalidades.html" data-menu="modalidades"><i class="fa-solid fa-dumbbell"></i> Modalidades</a></li>
    <li><a href="../planoFront/plano.html" data-menu="planos"><i class="fa-solid fa-list"></i> Planos (Admin)</a></li>
    <li><a href="../planoFront/planos-aluno.html" data-menu="meus-planos"><i class="fa-solid fa-ticket"></i> Meus Planos</a></li>
    <li><a href="../relatorios/relatorios.html" data-menu="relatorios"><i class="fa-solid fa-file"></i> Relatórios</a></li>
    <li><a href="../treinos/treinos.html" data-menu="treinos"><i class="fa-solid fa-file"></i> Treinos</a></li>
    <li><a href="../calendarioFront/calendario.html" data-menu="calendario"><i class="fa-solid fa-calendar"></i> Calendário</a></li>
  </ul>

  <ul class="menu-bottom">
   <li><button type="button" data-theme-toggle><i class="fa-solid fa-moon"></i> <span>Modo escuro</span></button></li>
   <li><a href="../loginFront/logout.html" data-menu="sair"><i class="fa-solid fa-right-from-bracket"></i> Sair</a></li>
  </ul>
</aside>

  <main class="content">
    <div class="top">
      <h1>Treinos</h1>
      <div class="filters">
        <input type="text" id="buscarTreino" placeholder="Buscar treino...">
        <select id="filtroModalidadeTreino">
          <option value="">Modalidade</option>
        </select>
      </div>
      <button id="btnNovoTreino" class="btn-primary">
        <i class="fa-solid fa-plus"></i> Novo Treino
      </button>
    </div>

    <section class="lista" id="listaTreinos"></section>
    <div id="paginacaoTreinos" class="paginacao"></div>
  </main>

  <div class="modal-bg" id="modalTreino">
    <div class="modal">
      <h2 id="tituloModalTreino">Novo Treino</h2>

      <label>Nome do Treino</label>
      <input type="text" id="nomeTreino">

      <label>Descrição</label>
      <textarea id="descricaoTreino" placeholder="Descreva o treino..."></textarea>

      <label>Modalidade</label>
      <select id="modalidadeTreino">
        <option value="">Selecione</option>
      </select>

      <label>Treinador</label>
      <select id="treinadorTreino">
        <option value="">Selecione</option>
      </select>

      <label>Aluno</label>
      <select id="alunoTreino">
        <option value="">Selecione</option>
      </select>

      <label>Duração (minutos)</label>
      <input type="number" id="duracaoTreino" placeholder="Ex: 60" min="1">

      <label>Nível</label>
      <select id="nivelTreino">
        <option value="">Selecione</option>
        <option value="Iniciante">Iniciante</option>
        <option value="Intermediário">Intermediário</option>
        <option value="Avançado">Avançado</option>
      </select>

      <div class="modal-actions">
        <button class="btn-primary" id="salvarTreino">Salvar</button>
        <button class="btn-secondary" id="fecharModalTreino">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="/js/theme.js"></script>
  <script type="module" src="/treinos/treinos.js"></script>
</body>
</html>
